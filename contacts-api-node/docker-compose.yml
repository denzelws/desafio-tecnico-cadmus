version: "3.8"

services:
  mongodb:
    image: mongo:6
    container_name: contacts-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo "db.runCommand(\"ping\").ok" | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: contacts-api-node
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/contacts
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
